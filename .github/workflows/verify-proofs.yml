name: Verify TLAPS Proofs

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tlaps:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout hub + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install TLAPS
        run: |
          wget -q https://github.com/tlaplus/tlapm/releases/download/202210041448/tlaps-1.5.0-x86_64-linux-gnu-inst.bin
          chmod +x tlaps-1.5.0-x86_64-linux-gnu-inst.bin
          ./tlaps-1.5.0-x86_64-linux-gnu-inst.bin -d "$HOME/tlaps"
          echo "$HOME/tlaps/bin" >> "$GITHUB_PATH"

      - name: Verify admission safety proofs
        run: |
          cd formal/vortex-dse-cslot-proofs/specs
          tlapm --toolbox 0 0 Vortex_DSE_CSlot_Proofs.tla

      - name: Verify exactly-once proof
        run: |
          cd formal/vortex-dse-cslot-proofs/specs
          tlapm --toolbox 0 0 Vortex_DSE_CSlot_ExactlyOnce_Proof.tla
