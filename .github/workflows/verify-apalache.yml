name: Verify Apalache Models

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apalache:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout hub + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Apalache check for Merkle agreement
        run: |
          docker run --rm \
            -v "$PWD/formal/vortex-merkle-agreement":/var/apalache \
            -w /var/apalache \
            ghcr.io/informalsystems/apalache:latest \
            --out-dir=/tmp/apalache-out \
            check --cinit=ConstInit --inv=AllInv --length=8 MC_Vortex_DSE_CSlot_AE.tla
